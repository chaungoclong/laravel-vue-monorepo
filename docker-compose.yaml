services:
  api:
    container_name: app_api
    build:
      context: .
      dockerfile: infra/docker/php/Dockerfile
    restart: unless-stopped
    image: app
    working_dir: /var/www/api
    volumes:
      - ./apps/api:/var/www/api
    networks:
      - app_network
    healthcheck:
      test: [ "CMD-SHELL", "php artisan --version >/dev/null 2>&1 || exit 1" ]
      interval: 2s
      timeout: 5s
      retries: 10
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  web:
    container_name: app_web
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./apps/api/public:/var/www/api/public:ro
      - ./apps/api/storage:/var/www/api/storage:ro
      - ./infra/docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - app_network
    depends_on:
      - api
    restart: always

  db:
    container_name: app_db
    image: mysql:8.0
    restart: unless-stopped
    environment:
      - MYSQL_DATABASE=app
      - MYSQL_USER=app
      - MYSQL_PASSWORD=app
      - MYSQL_ROOT_PASSWORD=app
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - app_network
    ports:
      - "33060:3306"
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost" ]
      interval: 2s
      timeout: 5s
      retries: 10

  phpmyadmin:
    container_name: app_phpmyadmin
    image: phpmyadmin/phpmyadmin
    restart: unless-stopped
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
    ports:
      - "8089:80"
    networks:
      - app_network
    depends_on:
      - db

  redis:
    container_name: app_redis
    image: redis:6.2-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    networks:
      - app_network
    ports:
      - "6380:6379"
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 2s
      timeout: 5s
      retries: 10

  queue:
    container_name: app_queue
    restart: unless-stopped
    image: app
    volumes:
      - ./apps/api:/var/www/api
    depends_on:
      - api
    networks:
      - app_network
    command: [ "php", "artisan", "queue:listen", "--sleep=3", "--tries=3" ]

  scheduler:
    container_name: app_scheduler
    restart: unless-stopped
    image: app
    volumes:
      - ./apps/api:/var/www/api
    depends_on:
      - api
    networks:
      - app_network
    command: [ "php", "artisan", "schedule:work", "--verbose" ]

networks:
  app_network:
    driver: bridge

volumes:
  mysql_data:
    driver: local
  redis_data:
    driver: local