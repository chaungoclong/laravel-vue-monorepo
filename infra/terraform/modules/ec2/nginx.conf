server {
    listen 80;

    # Increase upload limit (Nginx default is only 1MB)
    client_max_body_size 50M;

    index index.php index.html;

    # SPA Mode: Redirect 404 errors to index.html for Vue Router handling
    error_page 404 = /index.html;

    # =====================================================
    # 1. FRONTEND (VUE.JS)
    # =====================================================
    location / {
        root /var/www/laravel-vue/web/current; # Directory containing Vue.js index.html
        # Check for physical file, if not found, return index.html (for Vue Router)
        try_files $uri $uri/ /index.html;
    }

    # =====================================================
    # 2. MEDIA & UPLOAD (LARAVEL STORAGE)
    # =====================================================
    location ~ ^/storage/ {
        # Point directly to API public directory (where the 'storage' symlink exists)
        root /var/www/laravel-vue/api/current/public;

        try_files $uri =404;

        # Optimization: Browser cache for 1 year & disable logs to reduce server load
        expires 1y;
        add_header Cache-Control "public, no-transform";

        # CORS: Allow resources (images/videos) to be fetched from different domains
        add_header Access-Control-Allow-Origin *;
        access_log off;
    }

    # =====================================================
    # 3. BACKEND (LARAVEL API)
    # =====================================================
    location /api {
        root /var/www/laravel-vue/api/current/public;
        # If file is not found, pass request to Laravel (index.php)
        try_files $uri $uri/ /index.php?$query_string;
    }

    # Internal processing for Laravel (Entry point)
    location = /index.php {
        internal; # Block direct user access via domain.com/index.php

        root /var/www/laravel-vue/api/current/public;
        fastcgi_intercept_errors on;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
        server unix:/run/php-fpm/www.sock;
    }

    # =====================================================
    # 4. SECURITY
    # =====================================================

    # Block execution of unknown PHP files in Frontend directory, force redirect to index.html
    location ~ \.php$ {
        root /var/www/laravel-vue/web/current;
        rewrite ^ /index.html break;
    }

    # Block access to sensitive files (e.g., .env, .git)
    location ~ /\. {
        deny all;
    }
}